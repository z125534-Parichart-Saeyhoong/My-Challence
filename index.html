<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        background-color: hsl(30, 38%, 92%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: "Montserrat", "Fraunces";
        flex-direction: column;
      }
      .card {
        display: flex;
        max-width: 650px;
        border-radius: 10px;
        overflow: hidden;
        background-color: white;
      }
      .box {
        padding: 30px;
      }

      .box p:first-child {
        color: gray;
        letter-spacing: 5px;
        font-size: 20px;
      }
      .box h3 {
        font-family: "Times New Roman", serif;
        font-size: 30px;
      }
      .box p:nth-of-type(2) {
        color: gray;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 20px;
      }
      .image-container ,.box {
        width: 50%;
      }
      .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .price-group {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 25px;
      }
      .price-new {
        color: hsl(158, 36%, 37%);
        font-size: 32px;
        font-weight: bold;
      }

      .price-old {
        color: #6c7289;
        text-decoration: line-through;
        font-size: 14px;
      }
      .attribution {
        font-size: 11px;
        text-align: center;
      }
      .box button {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        width: 100%;
        color: white;
        background-color: hsl(158, 36%, 37%);
        border: none;
        border-radius: 10px;
        padding: 15px 0;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }
      .box button:hover {
        background-color: hsl(158, 42%, 18%);
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
      @media (max-width: 48em) {
        .card {
          flex-direction: column; 
          width: 90%;
          margin: 20px;

        }

        .image-container,
        .box {
          width: 100%;
        }

        .box {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="image-container">
        <img src="./images/image-product-desktop.jpg" alt="Perfume" />
      </div>

      <div class="box">
        <p>PERFUME</p>
        <h3>Gabrielle Essence Eau De Parfum</h3>
        <p>
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="price-group">
          <span class="price-new">$149.99</span>
          <span class="price-old">$169.99</span>
        </div>

        <button>
          <img src="./images/icon-cart.svg" alt="" />
          Add to Cart
        </button>
      </div>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Parichart Saeyhoong</a>.
    </div>
  </body>
</html>
